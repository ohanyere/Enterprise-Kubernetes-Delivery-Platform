apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resources
  annotations:
    policies.kyverno.io/title: Require Resource Requests and Limits
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires CPU and memory requests and limits so workloads participate in
      scheduling and capacity management predictably.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Missing resources allow noisy-neighbor behavior and unbounded consumption.
    - name: require-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must define requests.cpu, requests.memory, limits.cpu, and limits.memory."
        pattern:
          spec:
            containers:
              - name: "*"
                resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
