apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-nonroot
  annotations:
    policies.kyverno.io/title: Require Non-Root Pods
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires workloads to declare runAsNonRoot so containers do not run with
      unnecessary root privileges.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Non-root execution reduces privilege escalation and container breakout risk.
    - name: require-pod-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods must set spec.securityContext.runAsNonRoot: true."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
