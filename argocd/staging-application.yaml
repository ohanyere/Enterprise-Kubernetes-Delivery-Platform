apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-go-service-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ohanyere/enterprise-kubernetes-delivery-platform.git
    targetRevision: HEAD
    path: deploy/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-go-service-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
