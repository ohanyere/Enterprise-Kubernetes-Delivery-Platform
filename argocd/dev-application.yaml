apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-go-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ohanyere/enterprise-kubernetes-delivery-platform.git
    targetRevision: HEAD
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: sample-go-service-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
