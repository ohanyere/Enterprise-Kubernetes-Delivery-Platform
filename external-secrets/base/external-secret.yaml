apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sample-go-service-secret
  namespace: sample-go-service-prod
  annotations:
    platform.example.com/purpose: "Sync sample-go-service runtime secrets from AWS Secrets Manager"
spec:
  # External Secrets Operator periodically reads AWS Secrets Manager and keeps
  # the generated Kubernetes Secret aligned with the centralized secret value.
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    # In a live install, this generated Secret replaces the manual example
    # Secret pattern currently used only as a repository placeholder.
    name: sample-go-service-secret
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        # Placeholder path only. Do not commit real secret values to Git.
        key: production/sample-go-service/api-key
        property: API_KEY
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        # The same remote object can expose multiple JSON properties.
        key: production/sample-go-service/api-key
        property: DATABASE_PASSWORD
