apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    platform.example.com/purpose: "Central AWS Secrets Manager access for External Secrets Operator"
spec:
  provider:
    aws:
      # AWS Secrets Manager remains the source of truth. Kubernetes receives only
      # synchronized Secret objects generated by External Secrets Operator.
      service: SecretsManager
      # Replace this placeholder with the AWS region that owns the secrets.
      # Example: us-east-1
      region: "<aws-region>"
      # Authentication is intentionally left as a placeholder. In EKS, prefer
      # IRSA or a future pod identity integration instead of static credentials.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
