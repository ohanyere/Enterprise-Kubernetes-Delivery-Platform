name: Publish and Promote Dev

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: docker.io/kuberpull/sample-go-service

jobs:
  validate-before-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required container secrets
        env:
          CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
          CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          CONTAINER_REGISTRY_TOKEN: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
        run: |
          test -n "${CONTAINER_REGISTRY}"
          test -n "${CONTAINER_REGISTRY_USERNAME}"
          test -n "${CONTAINER_REGISTRY_TOKEN}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - name: Check gofmt
        run: test -z "$(gofmt -l ./apps/sample-go-service)"

      - name: Run go vet
        run: go vet ./apps/sample-go-service/...

      - name: Run Go tests
        run: go test ./apps/sample-go-service/...

      - name: Build local Docker image
        run: docker build -t "${IMAGE_NAME}:validation-${GITHUB_SHA}" .

      - name: Render dev overlay
        run: kubectl kustomize deploy/overlays/dev

  publish-container:
    runs-on: ubuntu-latest
    needs: validate-before-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}

      - name: Build and push immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  promote-dev:
    runs-on: ubuntu-latest
    needs: publish-container
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Promote dev image tag
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          yq -i '
          (.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newName) = strenv(IMAGE_NAME) |
          (.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newTag) = strenv(IMAGE_TAG)
          ' deploy/overlays/dev/kustomization.yaml

      - name: Commit and push dev promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- deploy/overlays/dev/kustomization.yaml; then
            echo "No dev promotion changes to commit."
            exit 0
          fi

          git add deploy/overlays/dev/kustomization.yaml
          git commit -m "chore: promote dev to sha-${GITHUB_SHA} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
