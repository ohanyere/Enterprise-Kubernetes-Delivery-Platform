name: Promote Staging

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Read promoted image
        run: |
          echo "IMAGE_NAME=$(yq '.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newName' deploy/overlays/dev/kustomization.yaml)" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$(yq '.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newTag' deploy/overlays/dev/kustomization.yaml)" >> "$GITHUB_ENV"

      - name: Verify dev image is immutable
        run: |
          test -n "${IMAGE_NAME}"
          test -n "${IMAGE_TAG}"
          test "${IMAGE_TAG}" != "latest"
          case "${IMAGE_TAG}" in
            sha-*) ;;
            *)
              echo "Dev image tag must be an immutable sha-* tag, got: ${IMAGE_TAG}"
              exit 1
              ;;
          esac

      - name: Update staging overlay image
        run: |
          yq -i '
          (.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newName) = strenv(IMAGE_NAME) |
          (.images[] | select(.name == "docker.io/kuberpull/sample-go-service") | .newTag) = strenv(IMAGE_TAG)
          ' deploy/overlays/staging/kustomization.yaml

      - name: Render staging overlay
        run: kubectl kustomize deploy/overlays/staging

      - name: Commit and push staging promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- deploy/overlays/staging/kustomization.yaml; then
            echo "No staging promotion changes to commit."
            exit 0
          fi

          git add deploy/overlays/staging/kustomization.yaml
          git commit -m "chore: promote staging to ${IMAGE_TAG} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
